version: "3.8"

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME:-routes_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME:-routes_db}"]
      interval: 10s
      timeout: 5s
      retries: 10

  scraper:
    build:
      context: ./scraper
      dockerfile: Dockerfile
    # Run on demand: docker-compose run --rm scraper python scrape_routes.py <URL>
    # Leave restart unset — scraper is a one-shot command, not a daemon.
    env_file:
      - .env
    environment:
      DB_HOST: db
      DB_PORT: 5432
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:

