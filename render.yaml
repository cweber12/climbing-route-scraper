services:
  - type: web
    name: climbing-route-scraper-api
    runtime: docker
    dockerfilePath: ./api/Dockerfile
    dockerContext: ./api
    healthCheckPath: /health
    autoDeployTrigger: checksPass   # only deploy after CI passes
    envVars:
      - key: DATABASE_URL
        sync: false   # set this manually in the Render dashboard — never commit it
