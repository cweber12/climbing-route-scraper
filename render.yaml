services:
  - type: web
    name: climbing-route-scraper-api
    runtime: image
    image:
      url: ghcr.io/cweber12/climbing-route-scraper-api:main
    healthCheckPath: /health
    # autoDeployTrigger does not apply to image-based deploys;
    # redeployment is triggered by the docker.yml workflow via RENDER_DEPLOY_HOOK_URL.
    envVars:
      - key: DATABASE_URL
        sync: false   # set this manually in the Render dashboard — never commit it
